// ---- Composant principal ----
const App = () => {
  const [isAdmin, setIsAdmin] = useState(false);
  const [showPrices, setShowPrices] = useState(() => {
    const saved = localStorage.getItem('show_prices');
    return saved !== null ? JSON.parse(saved) : true;
  });
  const [currentView, setCurrentView] = useState(DICT.VIEW.DASHBOARD);
  const [selectedBrand, setSelectedBrand] = useState(null);
  const [isTransitioning, setIsTransitioning] = useState(false);

  // Toast state
  const [toast, setToast] = useState({ message: '', type: 'info', visible: false });
  const toastTimeout = useRef(null);

  const showToast = (message, type = 'info') => {
    if (toastTimeout.current) clearTimeout(toastTimeout.current);
    setToast({ message, type, visible: true });
    toastTimeout.current = setTimeout(() => {
      setToast({ message: '', type: 'info', visible: false });
    }, 4000);
  };

  const hideToast = () => {
    if (toastTimeout.current) clearTimeout(toastTimeout.current);
    setToast({ message: '', type: 'info', visible: false });
  };

  // États modaux
  const [modals, setModals] = useState({
    brand: false,
    product: false,
    brandSelect: false,
    manage: false,
    imgbb: false,
    productDetail: false,
    cart: false,
    orders: false,
    notifications: false
  });
  const [editingProduct, setEditingProduct] = useState(null);
  const [manageSelectedBrand, setManageSelectedBrand] = useState(null);

  // États pour le panneau Données
  const [showDataPanel, setShowDataPanel] = useState(false);
  const [selectedBrandForData, setSelectedBrandForData] = useState('');

  // États pour gestion des marques
  const [editingBrandId, setEditingBrandId] = useState(null);
  const [editingBrandName, setEditingBrandName] = useState('');
  const [editingBrandImage, setEditingBrandImage] = useState(null);
  const [confirmDeleteBrandId, setConfirmDeleteBrandId] = useState(null);
  const [confirmDeleteProduct, setConfirmDeleteProduct] = useState(null);

  // Produit sélectionné pour le détail
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [productQuantity, setProductQuantity] = useState(1);

  // Panier
  const [cart, setCart] = useState(() => {
    const saved = localStorage.getItem('cart');
    return saved ? JSON.parse(saved) : [];
  });
  useEffect(() => {
    localStorage.setItem('cart', JSON.stringify(cart));
  }, [cart]);

  // Commandes validées
  const [orders, setOrders] = useState(() => {
    const saved = localStorage.getItem('orders');
    return saved ? JSON.parse(saved) : [];
  });
  useEffect(() => {
    localStorage.setItem('orders', JSON.stringify(orders));
  }, [orders]);

  // Onglet des commandes
  const [orderTab, setOrderTab] = useState('received');

  // Clé API imgbb
  const [imgbbApiKey, setImgbbApiKey] = useState(() => localStorage.getItem('imgbb_api_key') || '');
  useEffect(() => {
    localStorage.setItem('imgbb_api_key', imgbbApiKey);
  }, [imgbbApiKey]);

  // Topic ntfy
  const [ntfyTopic, setNtfyTopic] = useState(() => localStorage.getItem('ntfy_topic') || 'ldholdingnotif');
  useEffect(() => {
    localStorage.setItem('ntfy_topic', ntfyTopic);
  }, [ntfyTopic]);

  // Données avec localStorage
  const [brands, setBrands] = useState(() => {
    const saved = localStorage.getItem('market_brands');
    return saved ? JSON.parse(saved) : [];
  });
  useEffect(() => {
    localStorage.setItem('market_brands', JSON.stringify(brands));
  }, [brands]);

  // Sauvegarde de showPrices
  useEffect(() => {
    localStorage.setItem('show_prices', JSON.stringify(showPrices));
  }, [showPrices]);

  // Nouveaux formulaires
  const [newBrand, setNewBrand] = useState({
    name: "",
    image: null
  });
  const [newProduct, setNewProduct] = useState({
    name: "",
    qty: "",
    price: "",
    image: null,
    brandId: null
  });

  // Références
  const fileInputRef = useRef(null);
  const imageInputRef = useRef(null);

  // Helpers
  const setImage = (setter, state, imageUrl) => setter({
    ...state,
    image: imageUrl
  });
  const uploadToImgbb = async dataUrl => {
    if (!imgbbApiKey) return dataUrl;
    try {
      const formData = new FormData();
      formData.append('key', imgbbApiKey);
      formData.append('image', dataUrl);
      const response = await fetch('https://api.imgbb.com/1/upload', {
        method: 'POST',
        body: formData
      });
      const json = await response.json();
      if (json.success) {
        return json.data.url;
      } else {
        console.error('ImgBB upload error:', json);
        return dataUrl;
      }
    } catch (e) {
      console.error('ImgBB upload failed:', e);
      return dataUrl;
    }
  };
  const handleImageUpload = (e, setter, state) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async event => {
      const img = new Image();
      img.onload = async () => {
        const canvas = document.createElement("canvas");
        const size = 300;
        canvas.width = canvas.height = size;
        const ctx = canvas.getContext("2d");
        const ratio = Math.max(size / img.width, size / img.height);
        const w = img.width * ratio,
          h = img.height * ratio;
        ctx.drawImage(img, (size - w) / 2, (size - h) / 2, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
        const finalUrl = await uploadToImgbb(dataUrl);
        setter({
          ...state,
          image: finalUrl
        });
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
  };
  const addBrand = () => {
    if (!newBrand.name) {
      showToast("Veuillez entrer un nom de marque.", "error");
      return;
    }
    setBrands([...brands, {
      id: Date.now(),
      ...newBrand,
      products: []
    }]);
    setNewBrand({
      name: "",
      image: null
    });
    setModals(prev => ({
      ...prev,
      brand: false
    }));
    showToast("Marque ajoutée avec succès.", "success");
  };
  const addProduct = () => {
    if (!newProduct.name || !newProduct.brandId) {
      showToast("Veuillez remplir tous les champs.", "error");
      return;
    }
    setBrands(brands.map(b => b.id === newProduct.brandId ? {
      ...b,
      products: [...b.products, {
        id: Date.now(),
        ...newProduct,
        qty: Number(newProduct.qty),
        price: Number(newProduct.price),
        hidden: false
      }]
    } : b));
    setNewProduct({
      name: "",
      qty: "",
      price: "",
      image: null,
      brandId: null
    });
    setModals(prev => ({
      ...prev,
      product: false
    }));
    showToast("Produit ajouté avec succès.", "success");
  };
  const saveProductEdit = () => {
    setBrands(brands.map(b => ({
      ...b,
      products: b.products.map(p => p.id === editingProduct.id ? editingProduct : p)
    })));
    setEditingProduct(null);
    showToast("Produit modifié avec succès.", "success");
  };

  // Gestion des marques
  const startEditBrand = brand => {
    setEditingBrandId(brand.id);
    setEditingBrandName(brand.name);
    setEditingBrandImage(brand.image);
  };
  const cancelEditBrand = () => {
    setEditingBrandId(null);
    setEditingBrandName('');
    setEditingBrandImage(null);
  };
  const saveBrandEdit = () => {
    setBrands(brands.map(b => b.id === editingBrandId ? {
      ...b,
      name: editingBrandName,
      image: editingBrandImage
    } : b));
    cancelEditBrand();
    showToast("Marque modifiée avec succès.", "success");
  };
  const confirmDeleteBrand = id => {
    setConfirmDeleteBrandId(id);
  };
  const deleteBrand = () => {
    setBrands(brands.filter(b => b.id !== confirmDeleteBrandId));
    setConfirmDeleteBrandId(null);
    if (manageSelectedBrand === confirmDeleteBrandId) setManageSelectedBrand(null);
    showToast("Marque supprimée.", "success");
  };
  const cancelDeleteBrand = () => {
    setConfirmDeleteBrandId(null);
  };
  const triggerConfirmDeleteProduct = (brandId, productId) => {
    setConfirmDeleteProduct({
      brandId,
      productId
    });
  };
  const deleteProduct = () => {
    if (!confirmDeleteProduct) return;
    const {
      brandId,
      productId
    } = confirmDeleteProduct;
    setBrands(brands.map(b => b.id === brandId ? {
      ...b,
      products: b.products.filter(p => p.id !== productId)
    } : b));
    setConfirmDeleteProduct(null);
    showToast("Produit supprimé.", "success");
  };
  const cancelDeleteProduct = () => {
    setConfirmDeleteProduct(null);
  };

  const toggleProductVisibility = (brandId, productId) => {
    setBrands(brands.map(b => {
      if (b.id !== brandId) return b;
      return {
        ...b,
        products: b.products.map(p => {
          if (p.id !== productId) return p;
          return { ...p, hidden: !p.hidden };
        })
      };
    }));
  };

  const openBrand = brand => {
    setIsTransitioning(true);
    setTimeout(() => {
      setSelectedBrand(brand);
      setCurrentView(DICT.VIEW.DETAIL);
      setIsTransitioning(false);
    }, 300);
  };
  const goHome = () => {
    setIsTransitioning(true);
    setTimeout(() => {
      setCurrentView(DICT.VIEW.DASHBOARD);
      setIsTransitioning(false);
    }, 300);
  };

  // Gestion du produit détail
  const openProductDetail = (product, brand) => {
    setSelectedProduct({
      ...product,
      brandName: brand.name
    });
    setProductQuantity(1);
    setModals(prev => ({
      ...prev,
      productDetail: true
    }));
  };
  const addToCart = () => {
    if (!selectedProduct) return;
    const existing = cart.find(item => item.productId === selectedProduct.id && item.brandId === selectedProduct.brandId);
    if (existing) {
      setCart(cart.map(item => item.productId === selectedProduct.id && item.brandId === selectedProduct.brandId ? {
        ...item,
        quantity: item.quantity + productQuantity
      } : item));
    } else {
      setCart([...cart, {
        id: Date.now(),
        brandId: selectedProduct.brandId,
        productId: selectedProduct.id,
        name: selectedProduct.name,
        price: selectedProduct.price,
        packQty: selectedProduct.qty,
        quantity: productQuantity
      }]);
    }
    setModals(prev => ({
      ...prev,
      productDetail: false
    }));
    showToast(`${selectedProduct.name} ajouté au panier.`, "success");
  };
  const removeFromCart = id => {
    setCart(cart.filter(item => item.id !== id));
    showToast("Article retiré du panier.", "info");
  };
  const getTotalCartItems = () => cart.reduce((sum, item) => sum + item.quantity, 0);
  const getTotalPrice = () => cart.reduce((sum, item) => sum + item.quantity * item.price * item.packQty, 0);

  // === FONCTIONS NTFY (utilisant le topic dynamique) ===
  const sendNtfy = (totalItems, total) => {
    const topic = ntfyTopic || 'ldholdingnotif';
    
    const url = new URL(`https://ntfy.sh/${topic}`);
    url.searchParams.append('ta', 'package');
    url.searchParams.append('po', '3');
    url.searchParams.append('x', window.location.href);

    const message = `📦 Nouvelle Commande !\nNouvelle commande de ${totalItems} articles, total : ${total} DZD.`;
    
    console.log('📤 Envoi ntfy vers le topic:', topic);
    
    fetch(url, {
      method: 'POST',
      body: message
    })
    .then(response => {
      if (response.ok) {
        showToast(`✅ Commande validée ! ${totalItems} articles - ${total} DZD.`, "success");
      } else {
        showToast(`❌ Erreur ${response.status}: notification non envoyée.`, "error");
      }
    })
    .catch(error => {
      console.error('❌ Erreur réseau:', error);
      showToast("❌ Erreur réseau. Vérifie ta connexion.", "error");
    });
  };

  const testNtfy = () => {
    const topic = ntfyTopic || 'ldholdingnotif';
    
    const url = new URL(`https://ntfy.sh/${topic}`);
    url.searchParams.append('ta', 'test');
    url.searchParams.append('po', '3');

    const message = `🧪 Test ntfy\nTest depuis l'application.`;

    fetch(url, {
      method: 'POST',
      body: message
    })
    .then(response => {
      if (response.ok) {
        showToast(`✅ Test réussi sur le topic "${topic}" !`, "success");
      } else {
        showToast(`❌ Erreur ${response.status} sur le topic "${topic}".`, "error");
      }
    })
    .catch((err) => {
      console.error('❌ Erreur test:', err);
      showToast(`❌ Erreur réseau sur le topic "${topic}".`, "error");
    });
  };

  // Valider la commande
  const validateOrder = () => {
    if (cart.length === 0) {
      showToast("Votre panier est vide.", "error");
      return;
    }
    const total = getTotalPrice();
    const totalItems = getTotalCartItems();
    const newOrder = {
      id: Date.now(),
      date: new Date().toLocaleString(),
      items: cart.map(item => ({ ...item })),
      total: total,
      status: 'received'
    };
    setOrders([...orders, newOrder]);
    setCart([]);
    setModals(prev => ({ ...prev, cart: false }));
    sendNtfy(totalItems, total);
  };

  // Gestion des commandes
  const handleProcess = (orderId) => {
    setOrders(orders.map(order => 
      order.id === orderId ? { ...order, status: 'processing' } : order
    ));
    showToast("Commande traitée.", "success");
  };
  const handleDeliver = (orderId) => {
    setOrders(orders.map(order => 
      order.id === orderId ? { ...order, status: 'delivered' } : order
    ));
    showToast("Commande livrée.", "success");
  };
  const handleCancelOrder = (orderId) => {
    setOrders(orders.filter(order => order.id !== orderId));
    showToast("Commande annulée.", "info");
  };

  // toggle admin
  const toggleAdmin = () => {
    if (!isAdmin) {
      setIsAdmin(true);
      setCurrentView(DICT.VIEW.DASHBOARD);
      showToast("Mode administrateur activé.", "info");
    } else {
      setIsAdmin(false);
      showToast("Mode administrateur désactivé.", "info");
    }
  };

  // toggle prices
  const togglePrices = () => {
    setShowPrices(prev => !prev);
    showToast(showPrices ? "Prix masqués." : "Prix affichés.", "info");
  };

  // Export
  const exportData = () => {
    let products = [];
    if (selectedBrandForData) {
      const brandId = Number(selectedBrandForData);
      const brand = brands.find(b => b.id === brandId);
      if (brand) {
        products = brand.products.map(p => ({
          Nom: p.name,
          Prix: p.price,
          Pack: p.qty
        }));
      }
    } else {
      brands.forEach(b => {
        b.products.forEach(p => {
          products.push({
            Nom: p.name,
            Prix: p.price,
            Pack: p.qty
          });
        });
      });
    }
    if (products.length === 0) {
      showToast("Aucune donnée à exporter.", "error");
      return;
    }
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(products);
    XLSX.utils.book_append_sheet(wb, ws, "Produits");
    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const blob = new Blob([wbout], { type: 'application/octet-stream' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `export_produits_${new Date().toISOString().slice(0,10)}.xlsx`;
    link.click();
    URL.revokeObjectURL(link.href);
    showToast("Exportation réussie !", "success");
  };

  // Import
  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!selectedBrandForData) {
      showToast("Veuillez sélectionner une marque avant d'importer.", "error");
      return;
    }
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(firstSheet);
        const requiredColumns = ['Nom', 'Prix', 'Pack'];
        const headers = Object.keys(jsonData[0] || {});
        const hasAll = requiredColumns.every(col => headers.includes(col));
        if (!hasAll) {
          showToast("Le fichier doit contenir les colonnes : Nom, Prix, Pack.", "error");
          return;
        }
        const newProducts = jsonData.map(row => ({

          name: String(row.Nom || '').trim(),
          price: Number(row.Prix) || 0,
          qty: Number(row.Pack) || 0,
          image: null,
          brandId: Number(selectedBrandForData),
          hidden: false
        })).filter(p => p.name !== '');
        if (newProducts.length === 0) {
          showToast("Aucun produit valide à importer.", "error");
