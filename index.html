  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useCallback, useRef } = React;

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, errorInfo) { console.error('Erreur capturée:', error, errorInfo); }
      render() {
        if (this.state.hasError) {
          return React.createElement('div', { className: 'p-8 bg-red-900 text-white' }, 
            'Une erreur est survenue. Voir console pour détails.');
        }
        return this.props.children;
      }
    }

    // Normalisation (minuscules, suppression des accents)
    const normalizeString = (str) => {
      return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    };

    const processImage = (file) => {
      return new Promise((resolve, reject) => {
        if (!file.type.startsWith('image/')) {
          reject(new Error('Le fichier n\'est pas une image valide.'));
          return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const maxWidth = 800;
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) {
              height = (height * maxWidth) / width;
              width = maxWidth;
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob(
              (blob) => {
                if (blob) resolve(blob);
                else reject(new Error('Échec de la conversion en WebP.'));
              },
              'image/webp',
              0.8
            );
          };
          img.onerror = () => reject(new Error('Erreur lors du chargement de l\'image.'));
          img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error('Erreur lors de la lecture du fichier.'));
        reader.readAsDataURL(file);
      });
    };

    const uploadImageAndGetUrl = async (file, pathPrefix = 'products') => {
      if (!window.firebase || !window.firebase.storage) {
        throw new Error('Firebase Storage non disponible');
      }
      try {
        const processedBlob = await processImage(file);
        const fileName = `${pathPrefix}_${Date.now()}_${Math.random().toString(36).substr(2, 8)}.webp`;
        const storageRef = window.firebase.storage().ref();
        const fileRef = storageRef.child(fileName);
        const snapshot = await fileRef.put(processedBlob);
        const url = await snapshot.ref.getDownloadURL();
        return url;
      } catch (err) {
        console.error('Upload échoué:', err);
        throw err;
      }
    };

    const cleanBrands = (brandsArray) => {
      if (!Array.isArray(brandsArray)) return [];
      return brandsArray.filter(b => 
        b && typeof b === 'object' && 
        b.name && typeof b.name === 'string' && b.name.trim() !== ''
      ).map(b => ({
        ...b,
        name: b.name.trim(),
        products: Array.isArray(b.products) ? b.products : []
      }));
    };

    const cleanOrders = (ordersArray) => {
      if (!Array.isArray(ordersArray)) return [];
      return ordersArray.filter(o => o && typeof o === 'object').map(o => {
        let items = o.items;
        if (!Array.isArray(items)) items = Object.values(items || {});
        items = items.filter(i => i && i.product && i.product.name);
        return {
          ...o,
          items: items,
          total: typeof o.total === 'number' ? o.total : 0,
          delivery: o.delivery || { name: '', phone: '', address: '', instructions: '' },
          status: o.status || 'new'
        };
      });
    };

    const cleanOldDeliveredOrders = (orders, months = 3) => {
      const now = new Date();
      const cutoff = new Date(now.setMonth(now.getMonth() - months));
      return orders.filter(order => {
        if (order.status !== 'delivered') return true;
        let date = new Date(order.timestamp);
        if (isNaN(date)) {
          const parts = order.timestamp.split(/[ ,/:]+/);
          if (parts.length >= 3) {
            date = new Date(`${parts[2]}-${parts[1]}-${parts[0]}T${parts[3]}:${parts[4]}:${parts[5]}`);
          }
        }
        return date > cutoff;
      });
    };

    const App = () => {
      const [isAdmin, setIsAdmin] = useState(false);
      const [currentView, setCurrentView] = useState('home');
      const [selectedBrand, setSelectedBrand] = useState(null);
      const [isTransitioning, setIsTransitioning] = useState(false);
      const [notification, setNotification] = useState(null);
      const [isLoading, setIsLoading] = useState(true);
      const [showModal, setShowModal] = useState(false);
      const [showProductModal, setShowProductModal] = useState(false);
      const [showBrandSelect, setShowBrandSelect] = useState(false);
      const [showManageModal, setShowManageModal] = useState(false);
      const [showOrdersModal, setShowOrdersModal] = useState(false);
      const [showDataModal, setShowDataModal] = useState(false);
      const [editingProduct, setEditingProduct] = useState(null);
      const [editingBrand, setEditingBrand] = useState(null);
      const [manageSelectedBrand, setManageSelectedBrand] = useState(null);
      const [confirmAction, setConfirmAction] = useState(null);
      const [showPinModal, setShowPinModal] = useState(false);
      const [pinCode, setPinCode] = useState('');
      const [showPrices, setShowPrices] = useState(true);
      
      const [showBatchModal, setShowBatchModal] = useState(false);
      const [selectedBrandForBatch, setSelectedBrandForBatch] = useState(null);
      const [isUploadingBatch, setIsUploadingBatch] = useState(false);
      const [batchProgress, setBatchProgress] = useState({ current: 0, total: 0, status: '' });
      
      const [brands, setBrands] = useState(() => {
        const saved = localStorage.getItem('marketHubBrands');
        const parsed = saved ? JSON.parse(saved) : [];
        return cleanBrands(parsed);
      });
      const [newBrand, setNewBrand] = useState({ name: "", imageFile: null });
      const [newProduct, setNewProduct] = useState({ name: "", qty: "", price: "", imageFile: null, brandId: null });
      const [cart, setCart] = useState(() => {

      const [orders, setOrders] = useState(() => {
        const savedOrders = localStorage.getItem('marketHubOrders');

      });
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [showCartModal, setShowCartModal] = useState(false);
      const [productQuantity, setProductQuantity] = useState(1);
      const [showDeliveryModal, setShowDeliveryModal] = useState(false);
      const [deliveryInfo, setDeliveryInfo] = useState({ name: "", phone: "", address: "", instructions: "" });
      const [ordersActiveTab, setOrdersActiveTab] = useState("new");
      const [logs, setLogs] = useState([]);
      const [showDebug, setShowDebug] = useState(false);
      const logsEndRef = useRef(null);

      const firebaseInitialized = useRef(false);

      const addLog = useCallback((type, ...args) => {
        const timestamp = new Date().toLocaleTimeString();
        const message = args.map(arg => {
          if (typeof arg === 'object') { try { return JSON.stringify(arg); } catch(e) { return String(arg); } }
          return String(arg);
        }).join(' ');
        setLogs(prev => [{ type, timestamp, message }, ...prev].slice(0, 500));
      }, []);
      
      useEffect(() => {
        const originalLog = console.log;
        const originalError = console.error;
        console.log = (...args) => { addLog('log', ...args); originalLog(...args); };
        console.error = (...args) => { addLog('error', ...args); originalError(...args); };
        const handleError = (event) => addLog('error', `Global: ${event.message}`);
        const handleRejection = (event) => addLog('error', `Rejection: ${event.reason}`);
        window.addEventListener('error', handleError);
        window.addEventListener('unhandledrejection', handleRejection);
        return () => {
          console.log = originalLog; console.error = originalError;
          window.removeEventListener('error', handleError);
          window.removeEventListener('unhandledrejection', handleRejection);
        };
      }, [addLog]);
      
      // Firebase init
      useEffect(() => {
        let mounted = true;
        const initFirebase = () => {
          try {
            if (!window.firebaseInitialized && window.firebase && !firebaseInitialized.current) {
              const firebaseConfig = {
                apiKey: "AIzaSyBauxPkS-FXjCSErcluaOlReANeOL0vPEs",
                authDomain: "monapp-d2909.firebaseapp.com",
                databaseURL: "https://monapp-d2909-default-rtdb.europe-west1.firebasedatabase.app",
                projectId: "monapp-d2909",
                storageBucket: "monapp-d2909.firebasestorage.app",
                messagingSenderId: "632425841691",
                appId: "1:632425841691:web:1a701a8d3dd72d9bfee4be"
              };
              if (!window.firebase.apps.length) window.firebase.initializeApp(firebaseConfig);
              firebaseInitialized.current = true;
              addLog('log', 'Firebase initialisé (App, DB, Storage)');
              if (mounted) setFirebaseReady(true);
            } else {
              if (mounted) setFirebaseReady(true);
            }
          } catch(err) { addLog('error', 'Firebase init: ' + err.message); }
        };
        if (window.firebase) initFirebase();
        else { const check = setInterval(() => { if(window.firebase) { clearInterval(check); initFirebase(); } }, 200); }
        return () => { mounted = false; };
      }, [addLog]);
      
      // Chargement initial depuis Firebase
      useEffect(() => {
        if (!firebaseReady || !window.firebase || initialLoadDone.current) return;
        const db = window.firebase.database();
        db.ref('/').once('value').then(snapshot => {
          const data = snapshot.val();
          if (data?.data) {
            let raw = data.data;
            if (!Array.isArray(raw)) raw = Object.values(raw);
            const cleaned = cleanBrands(raw);
            setBrands(cleaned);
            localStorage.setItem('marketHubBrands', JSON.stringify(cleaned));
            addLog('log', 'Brands chargés');
          }
          if (data?.orders) {
            let rawOrders = data.orders;
            if (!Array.isArray(rawOrders)) rawOrders = Object.values(rawOrders);
            const cleanedOrders = cleanOrders(rawOrders);
            setOrders(cleanedOrders);
            localStorage.setItem('marketHubOrders', JSON.stringify(cleanedOrders));
            addLog('log', 'Orders chargés');
          }
          initialLoadDone.current = true;
          setIsLoading(false);
        }).catch(err => { 
          addLog('error', 'Firebase load: ' + err.message); 
          initialLoadDone.current = true; 
          setIsLoading(false);
        });
      }, [firebaseReady]);
      
      // Sauvegarde immédiate dans Firebase
      useEffect(() => {
        if (!firebaseReady || !initialLoadDone.current) return;
        window.firebase.database().ref('data').set(brands)
          .then(() => addLog('log', 'Brands sauvegardés'))
          .catch(err => addLog('error', 'Erreur sauvegarde brands: ' + err.message));
      }, [brands, firebaseReady]);
      useEffect(() => {
        if (!firebaseReady || !initialLoadDone.current) return;
        window.firebase.database().ref('orders').set(orders)
          .then(() => addLog('log', 'Orders sauvegardés'))
          .catch(err => addLog('error', 'Erreur sauvegarde orders: ' + err.message));
      }, [orders, firebaseReady]);
      
      useEffect(() => { localStorage.setItem('marketHubCart', JSON.stringify(cart)); }, [cart]);
      useEffect(() => { localStorage.setItem('marketHubBrands', JSON.stringify(brands)); }, [brands]);
      useEffect(() => { localStorage.setItem('marketHubOrders', JSON.stringify(orders)); }, [orders]);
      
      const notify = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 2000); };
      
      // ========== Actions manuelles (marques, produits) ==========
      const addBrand = async () => {
        if (!firebaseReady) { notify("Firebase pas encore prêt"); return; }
        if (newBrand.name && newBrand.name.trim()) {
          let imageUrl = null;
          if (newBrand.imageFile) {
            try {
              imageUrl = await uploadImageAndGetUrl(newBrand.imageFile, 'brands');
            } catch (err) {
              addLog('error', 'Upload image marque échoué: ' + err.message);
              notify("Erreur lors de l'upload de l'image");
              return;
            }
          }
          const newBrandObj = {
            id: Date.now(),
            name: newBrand.name.trim(),
            image: imageUrl,
            products: []
          };
          setBrands([...brands, newBrandObj]);
          setNewBrand({ name: "", imageFile: null });
          setShowModal(false);
          notify("Marque ajoutée");
        } else { notify("Nom requis"); }
      };
      const deleteBrand = (id) => { setBrands(brands.filter(b => b.id !== id)); notify("Marque supprimée"); };
      const saveBrandEdit = async () => {
        if (!firebaseReady) { notify("Firebase pas encore prêt"); return; }
        if (editingBrand.name && editingBrand.name.trim()) {
          let imageUrl = editingBrand.image;
          if (editingBrand.imageFile) {
            try {
              imageUrl = await uploadImageAndGetUrl(editingBrand.imageFile, 'brands');
            } catch (err) {
              addLog('error', 'Upload image marque échoué: ' + err.message);
              notify("Erreur lors de l'upload de l'image");
              return;
            }
          }
          setBrands(brands.map(b => b.id === editingBrand.id ? {...editingBrand, name: editingBrand.name.trim(), image: imageUrl} : b));
          setEditingBrand(null);
          notify("Marque mise à jour");
        } else { notify("Nom requis"); }
      };
      const addProduct = async () => {
        if (!firebaseReady) { notify("Firebase pas encore prêt"); return; }
        if (newProduct.name && newProduct.name.trim() && newProduct.brandId) {
          let imageUrl = null;
          if (newProduct.imageFile) {
            try {
              imageUrl = await uploadImageAndGetUrl(newProduct.imageFile, 'products');
            } catch (err) {
              addLog('error', 'Upload image produit échoué: ' + err.message);
              notify("Erreur lors de l'upload de l'image");
              return;
            }
          }
          const newProductObj = {
            id: Date.now(),
            name: newProduct.name.trim(),
            qty: newProduct.qty,
            price: newProduct.price,
            image: imageUrl
          };
          setBrands(brands.map(b => b.id === newProduct.brandId ? { ...b, products: [...b.products, newProductObj] } : b));
          setNewProduct({ name: "", qty: "", price: "", imageFile: null, brandId: null });
          setShowProductModal(false);
          notify("Produit ajouté");
        } else { notify("Nom et marque requis"); }
      };
      const saveProductEdit = async () => {
        if (!firebaseReady) { notify("Firebase pas encore prêt"); return; }
        if (editingProduct.name && editingProduct.name.trim()) {
          let imageUrl = editingProduct.image;
          if (editingProduct.imageFile) {
            try {
              imageUrl = await uploadImageAndGetUrl(editingProduct.imageFile, 'products');
            } catch (err) {
              addLog('error', 'Upload image produit échoué: ' + err.message);
              notify("Erreur lors de l'upload de l'image");
              return;
            }
          }
          setBrands(brands.map(b => ({ ...b, products: b.products.map(p => p.id === editingProduct.id ? {...editingProduct, name: editingProduct.name.trim(), image: imageUrl} : p) })));
          setEditingProduct(null);
          notify("Produit modifié");
        } else { notify("Nom requis"); }
      };
      const deleteProduct = (brandId, productId) => { 
        setBrands(brands.map(b => b.id === brandId ? { ...b, products: b.products.filter(p => p.id !== productId) } : b)); 
        notify("Produit supprimé"); 
      };
      
      // ========== TRAITEMENT PAR LOT AVEC Promise.allSettled ==========
      const handleBatchProductUpload = async (files) => {
        if (!files || files.length === 0) return;
        if (!selectedBrandForBatch) {
          notify("Veuillez sélectionner une marque cible.");
          return;
        }
        if (!firebaseReady || !window.firebase || !window.firebase.storage) {
          notify("Firebase Storage n'est pas encore prêt.");
          return;
        }
        
        // Bloc try...finally pour garantir la réinitialisation
        try {
          setIsUploadingBatch(true);
          setBatchProgress({ current: 0, total: files.length, status: 'Préparation...' });
          
          // Copie locale des marques pour modifications
          let updatedBrands = [...brands];
          const brandIndex = updatedBrands.findIndex(b => b.id === selectedBrandForBatch);
          if (brandIndex === -1) {
            notify("La marque sélectionnée n'existe plus.");
            return;
          }
          const brandName = updatedBrands[brandIndex].name;
          let currentProducts = updatedBrands[brandIndex].products;
          
          // Préparer les tâches d'upload pour tous les fichiers
          const uploadTasks = files.map(async (file, index) => {
            // Mise à jour de la progression
            setBatchProgress({ current: index + 1, total: files.length, status: `Traitement de ${file.name}...` });
            
            try {
              const baseName = file.name.replace(/\.[^/.]+$/, '').trim();
              if (!baseName) throw new Error('Nom de fichier invalide');
              const normalizedBase = normalizeString(baseName);
              const existingProduct = currentProducts.find(p => normalizeString(p.name) === normalizedBase);
              const url = await uploadImageAndGetUrl(file, 'products');
              
              return { success: true, baseName, url, existingProduct, brandName };
            } catch (err) {
              addLog('error', `Erreur pour ${file.name}: ${err.message}`);
              return { success: false, fileName: file.name, error: err.message };
            }
          });
          
          // Exécution parallèle des uploads
          const results = await Promise.allSettled(uploadTasks);
          
          let successCount = 0;
          let errorCount = 0;
          let createdCount = 0;
          let updatedCount = 0;
          
          // Traitement des résultats
          for (const result of results) {
            if (result.status === 'fulfilled' && result.value.success) {
              const { baseName, url, existingProduct, brandName: bName } = result.value;
              if (existingProduct) {
                const productIdx = currentProducts.findIndex(p => p.id === existingProduct.id);
                if (productIdx !== -1) {
                  currentProducts[productIdx] = { ...existingProduct, image: url };
                  updatedCount++;
                  notify(`✅ Produit "${existingProduct.name}" mis à jour dans "${bName}"`);
                }
              } else {
                const newProductObj = {
                  id: Date.now() + Math.random(),
                  name: baseName,
                  qty: 0,
                  price: 0,
                  image: url
                };
                currentProducts.push(newProductObj);
                createdCount++;
                notify(`✅ Nouveau produit "${baseName}" créé dans "${bName}"`);
              }
              successCount++;
            } else {
              errorCount++;
            }
          }
          
          // Mettre à jour les produits dans la copie
          updatedBrands[brandIndex].products = currentProducts;
          
          if (successCount > 0) {
            setBrands(updatedBrands);
          }
          
          setBatchProgress({ current: files.length, total: files.length, status: 'Terminé' });
          
          // Gestion de la fermeture de la modale
          if (errorCount === 0) {
            notify(`✅ Import réussi : ${createdCount} créés, ${updatedCount} mis à jour.`);
            setShowBatchModal(false);
          } else if (successCount > 0) {
            const confirmClose = window.confirm(`Import terminé avec ${errorCount} erreur(s). Voulez-vous fermer la fenêtre ?`);
            if (confirmClose) setShowBatchModal(false);
          } else {
            notify(`❌ Aucune image importée (${errorCount} échec(s)).`);
          }
        } finally {
          setIsUploadingBatch(false);
          setBatchProgress({ current: 0, total: 0, status: '' });
        }
      };
      
      // ========== Export/Import Excel (inchangé) ==========
      const exportToExcel = () => {
        if(!window.XLSX){ notify("Excel non chargé"); return; }
        try {
          const data = [["Marque","Produit","Quantité","Prix"], ...brands.flatMap(b => b.products.map(p => [b.name, p.name, p.qty, p.price]))];
          const ws = window.XLSX.utils.aoa_to_sheet(data);
          const wb = window.XLSX.utils.book_new();
          window.XLSX.utils.book_append_sheet(wb, ws, "Inventaire");
          window.XLSX.writeFile(wb, "export_inventaire.xlsx");
          notify("Export réussi");
        } catch(e) { addLog('error', e.message); notify("Erreur export"); }
      };
      
      const analyzeImportFile = (file) => {
        if(!window.XLSX) { notify("Excel non chargé"); return; }
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result);
            const wb = window.XLSX.read(data, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
            if(!rows || rows.length<2) throw new Error("Fichier vide");
            const brandProducts = new Map();
            let totalProducts = 0, errors = [];
            for(let i=1; i<rows.length; i++) {
              const row = rows[i];
              if(!row || row.length<4) continue;
              let brandName = row[0]?.trim() || "";
              const productName = row[1]?.trim();
              if(!productName) continue;
              if(!brandName) brandName = "Inconnue";
              let qty = parseFloat(row[2]), price = parseFloat(row[3]);
              if(isNaN(qty)) { errors.push(`Ligne ${i+1}: Qté non numérique`); continue; }
              if(isNaN(price)) { errors.push(`Ligne ${i+1}: Prix non numérique`); continue; }
              if(!brandProducts.has(brandName)) brandProducts.set(brandName, new Map());
              const prodMap = brandProducts.get(brandName);
              if(!prodMap.has(productName)) { prodMap.set(productName, { qty, price }); totalProducts++; }
              else prodMap.set(productName, { qty, price });
            }
            setPreviewData({ brandProducts, totalProducts, totalBrands: brandProducts.size, errors });
            notify(`Analyse : ${totalProducts} produits, ${brandProducts.size} marques, ${errors.length} erreurs.`);
          } catch(e) { addLog('error', e.message); notify("Erreur analyse"); setPreviewData(null); }
        };
        reader.readAsArrayBuffer(file);
      };
      
      const confirmImport = async () => {
        if(!previewData || isImporting) return;
        setIsImporting(true);
        await new Promise(r => setTimeout(r, 50));
        try {
          const { brandProducts } = previewData;
          let updatedBrands = [...brands];
          let added = 0, updated = 0;
          for(let [brandName, productsMap] of brandProducts.entries()) {
            let idx = updatedBrands.findIndex(b => b.name === brandName);
            if(idx === -1) { 
              updatedBrands.push({ id: Date.now()+Math.random()*10000, name: brandName, image: null, products: [] }); 
              idx = updatedBrands.length-1; 
            }
            const existing = updatedBrands[idx].products;
            for(let [prodName, { qty, price }] of productsMap.entries()) {
              const existIdx = existing.findIndex(p => p.name === prodName);
              if(existIdx !== -1) { existing[existIdx].qty = qty; existing[existIdx].price = price; updated++; }
              else { existing.push({ id: Date.now()+Math.random()*10000, name: prodName, qty, price, image: null }); added++; }
            }
            updatedBrands[idx].products = existing;
          }
          setBrands(updatedBrands);
          notify(`Import : ${added} nouveaux, ${updated} mis à jour.`);
          setPreviewData(null); setShowDataModal(false);
        } catch(e) { addLog('error', e.message); notify("Erreur import"); }
        finally { setIsImporting(false); }
      };
      const cancelPreview = () => { setPreviewData(null); notify("Import annulé"); };
      
      // Navigation & authentification
      const openBrand = (brand) => {
        if (!brand || !brand.products || !Array.isArray(brand.products)) { notify("Marque invalide"); return; }

      // Export CSV historique
      const exportDeliveredHistory = () => {
        if (deliveredOrders.length === 0) { notify("Aucune commande livrée à exporter"); return; }
        const rows = [["Date","ID Commande","Client","Téléphone","Marque","Produit","Quantité","Prix Unitaire","Total Ligne","Instructions"]];
        deliveredOrders.forEach(order => {
          const delivery = order.delivery || {};
          const timestamp = order.timestamp || "";
          const orderId = order.id || "";
          const client = delivery.name || "";
          const phone = delivery.phone || "";
          const instructions = delivery.instructions || "";
          const items = order.items || [];
          items.forEach(item => {
            const product = item.product || {};
            const brandName = item.brandName || "";
            const productName = product.name || "";
            const quantity = item.quantity || 0;
            const unitPrice = product.price || 0;
            const lineTotal = unitPrice * quantity;
            rows.push([timestamp, orderId, client, phone, brandName, productName, quantity, unitPrice, lineTotal, instructions]);
          });
        });
        const escapeCSV = (value) => {
          if (value === undefined || value === null) return "";
          const str = String(value);
          if (str.includes(",") || str.includes("\"") || str.includes("\n")) return `"${str.replace(/"/g, "\"\"")}"`;
          return str;
        };
        const csvContent = rows.map(row => row.map(escapeCSV).join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `commandes_livrees_${new Date().toISOString().slice(0, 19)}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        notify("Export CSV terminé");
      };

                    </div>
                  ))}
                  <div ref={logsEndRef} />
                </div>
              )}
            </div>
          </div>
        );

                  <div className="p-4 border-b border-slate-700 flex justify-between items-center"><h2 className="text-lg font-bold text-slate-100">Commandes</h2><button onClick={() => setShowOrdersModal(false)} className="text-slate-400 text-2xl hover:text-slate-200">&times;</button></div>
                  <div className="flex border-b border-slate-700">
                    <button onClick={() => setOrdersActiveTab("new")} className={`flex-1 py-3 text-xs font-medium ${ordersActiveTab==="new"?"text-indigo-400 border-b-2 border-indigo-400":"text-slate-400"}`}>Nouvelles ({newOrders.length})</button>
                    <button onClick={() => setOrdersActiveTab("processed")} className={`flex-1 py-3 text-xs font-medium ${ordersActiveTab==="processed"?"text-indigo-400 border-b-2 border-indigo-400":"text-slate-400"}`}>Traitées ({processedOrders.length})</button>
                    <button onClick={() => setOrdersActiveTab("delivered")} className={`flex-1 py-3 text-xs font-medium ${ordersActiveTab==="delivered"?"text-indigo-400 border-b-2 border-indigo-400":"text-slate-400"}`}>Livrées ({deliveredOrders.length})</button>
                  </div>
                  <div className="flex-1 overflow-y-auto p-3">
                    {ordersActiveTab === "new" && (newOrders.length===0?<p className="text-center text-slate-400 py-4">Aucune nouvelle commande</p>:newOrders.map(order=>{
                      const safeItems = Array.isArray(order.items) ? order.items : [];
                      return (
                        <div key={order.id} className="mb-4 p-3 bg-slate-700/50 rounded-xl border border-slate-600">
                          <div className="text-xs text-slate-400 mb-1">{order.timestamp}</div>
                          <div className="font-semibold text-slate-100">{order.delivery?.name || 'Nom inconnu'}</div>
                          <div className="text-xs text-slate-300">{order.delivery?.address || ''}</div>
                          {order.delivery?.phone && <div className="text-xs text-slate-300">📞 {order.delivery.phone}</div>}
                          {order.delivery?.instructions && <div className="text-xs italic text-slate-400 mt-1">📝 {order.delivery.instructions}</div>}
                          <div className="mt-2 space-y-1">
                            {safeItems.map((item,idx)=>(
                              <div key={idx} className="flex justify-between text-xs text-slate-300">
                                <span>{item.quantity}× {item.product?.name || 'Produit supprimé'}</span>
                                {showPrices && item.product?.price ? <span>{(item.product.price * item.quantity).toFixed(2)} DZD</span> : <span>•••</span>}
                              </div>
                            ))}
                          </div>
                          <div className="flex justify-between items-center mt-2 pt-2 border-t border-slate-600">
                            {showPrices ? <span className="font-bold text-indigo-400">Total : {order.total?.toFixed(2) || '0.00'} DZD</span> : <span className="font-bold text-slate-400">Total : •••</span>}
                            <button onClick={()=>requestConfirm("update",{orderId:order.id,newStatus:"processed"},()=>updateOrderStatus(order.id,"processed"))} className="px-3 py-1 bg-indigo-600 text-white rounded-lg text-xs font-bold">Marquer traitée</button>
                          </div>
                        </div>
                      );
                    }))}
                    {ordersActiveTab === "processed" && (processedOrders.length===0?<p className="text-center text-slate-400 py-4">Aucune commande traitée</p>:processedOrders.map(order=>{
                      const safeItems = Array.isArray(order.items) ? order.items : [];
                      return (
                        <div key={order.id} className="mb-4 p-3 bg-slate-700/50 rounded-xl border border-slate-600">
                          <div className="text-xs text-slate-400 mb-1">{order.timestamp}</div>
                          <div className="font-semibold text-slate-100">{order.delivery?.name || 'Nom inconnu'}</div>
                          <div className="text-xs text-slate-300">{order.delivery?.address || ''}</div>
                          {order.delivery?.phone && <div className="text-xs text-slate-300">📞 {order.delivery.phone}</div>}
                          {order.delivery?.instructions && <div className="text-xs italic text-slate-400 mt-1">📝 {order.delivery.instructions}</div>}
                          <div className="mt-2 space-y-1">
                            {safeItems.map((item,idx)=>(
                              <div key={idx} className="flex justify-between text-xs text-slate-300">
                                <span>{item.quantity}× {item.product?.name || 'Produit supprimé'}</span>
                                {showPrices && item.product?.price ? <span>{(item.product.price * item.quantity).toFixed(2)} DZD</span> : <span>•••</span>}
                              </div>
                            ))}
                          </div>
                          <div className="flex justify-between items-center mt-2 pt-2 border-t border-slate-600">
                            {showPrices ? <span className="font-bold text-indigo-400">Total : {order.total?.toFixed(2) || '0.00'} DZD</span> : <span className="font-bold text-slate-400">Total : •••</span>}
                            <button onClick={()=>requestConfirm("update",{orderId:order.id,newStatus:"delivered"},()=>updateOrderStatus(order.id,"delivered"))} className="px-3 py-1 bg-indigo-600 text-white rounded-lg text-xs font-bold">Marquer livrée</button>
                          </div>
                        </div>
                      );
                    }))}
                    {ordersActiveTab === "delivered" && (
                      <div>
                        <div className="flex justify-end gap-2 mb-3">
                          <button onClick={cleanOldOrders} className="px-3 py-1 bg-yellow-600 text-white rounded-lg text-xs font-bold hover:bg-yellow-500">Nettoyer (3 mois)</button>
                          <button onClick={exportDeliveredHistory} className="px-3 py-1 bg-indigo-600 text-white rounded-lg text-xs font-bold hover:bg-indigo-500">Historique (CSV)</button>
                          <button onClick={clearDeliveredHistory} className="px-3 py-1 bg-red-700 text-white rounded-lg text-xs font-bold hover:bg-red-600">Tout vider</button>
                        </div>
                        {deliveredOrders.length === 0 ? <p className="text-center text-slate-400 py-4">Aucune commande livrée</p> : deliveredOrders.map(order=>{
                          const safeItems = Array.isArray(order.items) ? order.items : [];
                          return (
                            <div key={order.id} className="mb-4 p-3 bg-slate-700/50 rounded-xl border border-slate-600 opacity-75">
                              <div className="text-xs text-slate-400 mb-1">{order.timestamp}</div>
                              <div className="font-semibold text-slate-100">{order.delivery?.name || 'Nom inconnu'}</div>
                              <div className="text-xs text-slate-300">{order.delivery?.address || ''}</div>
                              {order.delivery?.phone && <div className="text-xs text-slate-300">📞 {order.delivery.phone}</div>}
                              {order.delivery?.instructions && <div className="text-xs italic text-slate-400 mt-1">📝 {order.delivery.instructions}</div>}
                              <div className="mt-2 space-y-1">
                                {safeItems.map((item,idx)=>(
                                  <div key={idx} className="flex justify-between text-xs text-slate-300">
                                    <span>{item.quantity}× {item.product?.name || 'Produit supprimé'}</span>
                                    {showPrices && item.product?.price ? <span>{(item.product.price * item.quantity).toFixed(2)} DZD</span> : <span>•••</span>}
                                  </div>
                                ))}
                              </div>
                              <div className="flex justify-between items-center mt-2 pt-2 border-t border-slate-600">
                                {showPrices ? <span className="font-bold text-indigo-400">Total : {order.total?.toFixed(2) || '0.00'} DZD</span> : <span className="font-bold text-slate-400">Total : •••</span>}
                                <span className="text-xs text-emerald-400">Livrée</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
            
            {showDataModal && isAdmin && (
              <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                <div className="bg-slate-800 w-full max-w-[340px] rounded-2xl p-6 shadow-2xl border border-slate-700">
                  <div className="flex justify-between items-center mb-4"><h2 className="text-lg font-bold text-slate-100">Gestion des données</h2><button onClick={()=>{setShowDataModal(false); setPreviewData(null);}} className="text-slate-400 text-2xl hover:text-slate-200">&times;</button></div>
                  {!previewData ? (
                    <div className="mt-2 flex flex-col gap-3">
                      <button onClick={exportToExcel} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold active:scale-95 hover:bg-indigo-500">Exporter tout l'inventaire (Excel)</button>
                      <label className="w-full py-3 text-center rounded-xl font-bold bg-indigo-600 text-white cursor-pointer hover:bg-indigo-500 active:scale-95">
                        Choisir un fichier Excel à importer
                        <input type="file" className="hidden" accept=".xlsx,.xls,.csv" onChange={(e)=>{ if(e.target.files[0]) analyzeImportFile(e.target.files[0]); e.target.value=''; }} />
                      </label>
                      <button 
                        onClick={() => setShowBatchModal(true)} 
                        className={`w-full py-3 text-center rounded-xl font-bold transition-all active:scale-95 ${isUploadingBatch ? 'bg-gray-500 cursor-not-allowed' : 'bg-green-600 text-white hover:bg-green-500'}`}
                        disabled={isUploadingBatch}
                      >
                        {isUploadingBatch ? (batchProgress.total > 0 ? `📦 ${batchProgress.current}/${batchProgress.total}` : 'Chargement...') : '📦 Lot de produits'}
                      </button>
                    </div>
                  ) : (
                    <div className="mt-2">
                      <div className="bg-slate-700 p-3 rounded-lg mb-4">
                        <p className="text-sm font-semibold text-slate-100">Prévisualisation :</p>
                        <p className="text-xs text-slate-300">{previewData.totalProducts} produits détectés dans {previewData.totalBrands} marques</p>
                        {previewData.errors.length>0 && <p className="text-xs text-red-400 mt-1">{previewData.errors.length} erreurs de données</p>}
                      </div>
                      <div className="flex gap-3">
                        <button onClick={cancelPreview} disabled={isImporting} className="flex-1 py-2 bg-slate-700 rounded-xl font-medium text-slate-200 active:scale-95 disabled:opacity-50">Annuler</button>
                        <button onClick={confirmImport} disabled={isImporting} className="flex-1 py-2 bg-indigo-600 text-white rounded-xl font-bold active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2">
                          {isImporting ? (<> <svg className="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg> Importation... </>) : "Confirmer l'importation"}
                        </button>
                      </div>
                    </div>
                  )}
                  <p className="text-[10px] text-slate-400 mt-4 text-center">
                    Lot de produits : sélectionnez une marque, puis chargez plusieurs images.
                  </p>
                </div>
              </div>
            )}
            
            {showBatchModal && (
              <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                <div className="bg-slate-800 w-full max-w-[340px] rounded-2xl p-6 shadow-2xl border border-slate-700">
                  <div className="flex justify-between items-center mb-4">
                    <h2 className="text-lg font-bold text-slate-100">Import de produits par lot</h2>
                    <button onClick={() => setShowBatchModal(false)} className="text-slate-400 text-2xl hover:text-slate-200">&times;</button>
                  </div>
                  <label className="text-[10px] uppercase font-bold text-slate-400">Choisir la marque cible</label>
                  <select 
                    value={selectedBrandForBatch || ""} 
                    onChange={(e) => setSelectedBrandForBatch(e.target.value ? parseInt(e.target.value) : null)}
                    className="w-full p-2 mb-4 bg-slate-900 rounded-lg border border-slate-700 text-slate-200 text-sm"
                    disabled={isUploadingBatch}
                  >
                    <option value="">-- Sélectionner une marque --</option>
                    {safeBrands.map(b => (
                      <option key={b.id} value={b.id}>{b.name}</option>
                    ))}
                  </select>
                  
                  {isUploadingBatch && batchProgress.total > 0 && (
                    <div className="mb-4">
                      <div className="flex justify-between text-xs text-slate-400 mb-1">
                        <span>Progression</span>
                        <span>{batchProgress.current} / {batchProgress.total}</span>
                      </div>
                      <div className="w-full bg-slate-700 rounded-full h-2">
                        <div className="bg-indigo-600 h-2 rounded-full transition-all duration-300" style={{ width: `${(batchProgress.current / batchProgress.total) * 100}%` }}></div>
                      </div>
                      <p className="text-xs text-slate-300 mt-2">{batchProgress.status}</p>
                    </div>
                  )}
                  
                  <label className={`w-full py-3 text-center rounded-xl font-bold transition-all active:scale-95 ${!selectedBrandForBatch || isUploadingBatch ? 'bg-gray-500 cursor-not-allowed' : 'bg-blue-600 text-white cursor-pointer hover:bg-blue-500'}`}>
                    {isUploadingBatch ? 'Traitement en cours...' : 'Choisir les images (produits)'}
                    <input 
                      type="file" 
                      className="hidden" 
                      accept="image/*" 
                      multiple 
                      disabled={!selectedBrandForBatch || isUploadingBatch} 
                      onChange={(e) => {
                        if (e.target.files.length) handleBatchProductUpload(Array.from(e.target.files));
                        e.target.value = '';
                      }} 
                    />
                  </label>
                  <button onClick={() => setShowBatchModal(false)} className="w-full mt-4 py-2 bg-slate-700 rounded-xl font-medium text-slate-200 hover:bg-slate-600">Annuler</button>
                </div>
              </div>
            )}
            
            {(showModal || showProductModal || showBrandSelect || showManageModal || editingBrand) && (
              <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                <div className="bg-slate-800 w-full p-6 rounded-[28px] border border-slate-700 shadow-2xl max-h-[80vh] overflow-y-auto">
                  <div className="flex justify-end"><button onClick={()=>{ setShowModal(false); setShowProductModal(false); setShowBrandSelect(false); setShowManageModal(false); setEditingBrand(null); setEditingProduct(null); }} className="text-slate-400 text-2xl hover:text-slate-200">&times;</button></div>
                  {editingBrand && (
                    <>
                      <h2 className="text-slate-100 font-bold mb-6 text-lg border-l-4 border-indigo-500 pl-3">Modifier Marque</h2>
                      <label className="text-[9px] uppercase font-bold text-slate-400">Nom</label>
                      <input type="text" className="w-full p-3 mb-4 bg-slate-900 rounded-lg outline-none focus:ring-1 focus:ring-indigo-500 text-slate-100" value={editingBrand.name} onChange={e=>setEditingBrand({...editingBrand, name:e.target.value})} />
                      <FileInput onFileSelect={(file) => setEditingBrand({...editingBrand, imageFile: file})} label="Nouvelle image (optionnel)" />
                      <div className="flex gap-3"><button onClick={()=>setEditingBrand(null)} className="flex-1 py-3 bg-slate-700 rounded-xl font-medium text-slate-200">Annuler</button><button onClick={()=>requestConfirm("saveBrand",null,saveBrandEdit)} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-medium">Enregistrer</button></div>
                    </>
                  )}
                  {showModal && !editingBrand && (
                    <>
                      <h2 className="text-slate-100 font-bold mb-6 text-lg border-l-4 border-indigo-500 pl-3">Nouvelle Marque</h2>
                      <label className="text-[9px] uppercase font-bold text-slate-400">Nom</label>
                      <input type="text" className="w-full p-3 mb-4 bg-slate-900 rounded-lg outline-none focus:ring-1 focus:ring-indigo-500 text-slate-100" value={newBrand.name} onChange={e=>setNewBrand({...newBrand, name:e.target.value})} />
                      <FileInput onFileSelect={(file) => setNewBrand({...newBrand, imageFile: file})} label="Image (optionnel)" />
                      <div className="flex gap-3"><button onClick={()=>setShowModal(false)} className="flex-1 py-3 bg-slate-700 rounded-xl font-medium text-slate-200">Annuler</button><button onClick={()=>requestConfirm("addBrand",null,addBrand)} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-medium">Créer</button></div>
                    </>
                  )}
                  {showManageModal && !editingBrand && (
                    <>
                      <h2 className="text-slate-100 font-bold mb-6 text-lg border-l-4 border-indigo-500 pl-3">Gestion</h2>
                      {safeBrands.map(b => (
                        <div key={b.id} className="mb-3">
                          <button onClick={()=>setManageSelectedBrand(manageSelectedBrand===b.id?null:b.id)} className="w-full p-4 bg-slate-900 rounded-xl text-left font-semibold text-slate-200 shadow-sm border border-slate-700 hover:bg-slate-700">{b.name}</button>
                          {manageSelectedBrand===b.id && (
                            <div className="mt-2 pl-4">
                              <div className="flex justify-center gap-2 mb-3">
                                <button onClick={()=>requestConfirm("deleteBrand",{brandId:b.id},()=>deleteBrand(b.id))} className="px-3 py-1.5 bg-red-900/50 text-red-300 rounded-lg text-xs font-bold">✕ Supprimer</button>
                                <button onClick={()=>setEditingBrand(b)} className="px-3 py-1.5 bg-slate-700 text-slate-200 rounded-lg text-xs font-bold">✎ Modifier</button>
                              </div>
                              {b.products.map(p => (
                                <React.Fragment key={p.id}>
                                  <div className="flex items-center gap-2 mb-2">
                                    <button onClick={() => setEditingProduct(editingProduct?.id === p.id ? null : p)} className="flex-1 p-3 bg-slate-900 border border-slate-700 text-slate-200 text-xs font-medium rounded-lg shadow-sm hover:bg-slate-800 text-left">
                                      {p.name}
                                    </button>
                                    <button onClick={() => requestConfirm("deleteProduct", { brandId: b.id, productId: p.id }, () => deleteProduct(b.id, p.id))} className="w-8 h-8 bg-red-900/50 text-red-300 rounded-full font-bold active:scale-95 hover:bg-red-800/50">
                                      ✕
                                    </button>
                                  </div>
                                  {editingProduct && editingProduct.id === p.id && (
                                    <div className="p-4 mt-2 mb-3 bg-slate-900 rounded-2xl border border-slate-700">
                                      <label className="text-[9px] font-bold text-slate-400 uppercase">Nom</label>
                                      <input type="text" value={editingProduct.name} className="w-full p-2 mb-2 bg-slate-800 rounded-lg border border-slate-700 text-slate-100" onChange={e => setEditingProduct({...editingProduct, name: e.target.value})} />
                                      <label className="text-[9px] font-bold text-slate-400 uppercase">Quantité</label>
                                      <input type="number" value={editingProduct.qty} className="w-full p-2 mb-2 bg-slate-800 rounded-lg border border-slate-700 text-slate-100" onChange={e => setEditingProduct({...editingProduct, qty: e.target.value})} />
                                      <label className="text-[9px] font-bold text-slate-400 uppercase">Prix</label>
                                      <input type="number" value={editingProduct.price} className="w-full p-2 mb-3 bg-slate-800 rounded-lg border border-slate-700 text-slate-100" onChange={e => setEditingProduct({...editingProduct, price: e.target.value})} />
                                      <FileInput onFileSelect={(file) => setEditingProduct({...editingProduct, imageFile: file})} label="Nouvelle image (optionnel)" />
                                      <div className="flex gap-2">
                                        <button onClick={() => setEditingProduct(null)} className="flex-1 py-2 bg-slate-700 border border-slate-600 rounded-lg text-slate-200">Annuler</button>
                                        <button onClick={() => requestConfirm("saveProduct", null, saveProductEdit)} className="flex-1 py-2 bg-indigo-600 text-white rounded-lg">Enregistrer</button>
                                      </div>
                                    </div>
                                  )}
                                </React.Fragment>
                              ))}
                            </div>
                          )}
                        </div>
                      ))}
                      <button onClick={()=>setShowManageModal(false)} className="w-full py-3 bg-indigo-600 text-white rounded-xl mt-4 font-medium hover:bg-indigo-500">Fermer</button>
                    </>
                  )}
                  {showBrandSelect && !editingBrand && (
                    <>
                      <h2 className="text-slate-100 font-bold mb-6 text-lg border-l-4 border-indigo-500 pl-3">Choisir Marque</h2>
                      <div className="grid grid-cols-2 gap-3 mb-6">{safeBrands.map(b=> <button key={b.id} onClick={()=>{ setNewProduct({...newProduct, brandId:b.id}); setShowBrandSelect(false); setShowProductModal(true); }} className="p-3 bg-slate-900 border border-slate-700 rounded-xl font-medium text-slate-200 hover:bg-slate-800">{b.name}</button>)}</div>
                      <button onClick={()=>setShowBrandSelect(false)} className="w-full py-3 bg-slate-700 rounded-xl font-medium text-slate-200">Annuler</button>
                    </>
                  )}
                  {showProductModal && !editingBrand && (
                    <>
                      <h2 className="text-slate-100 font-bold mb-6 text-lg border-l-4 border-indigo-500 pl-3">Nouveau Produit</h2>
                      <label className="text-[9px] uppercase font-bold text-slate-400">Nom</label><input type="text" className="w-full p-3 mb-3 bg-slate-900 rounded-lg outline-none focus:ring-1 focus:ring-indigo-500 text-slate-100" onChange={e=>setNewProduct({...newProduct, name:e.target.value})} />
                      <label className="text-[9px] uppercase font-bold text-slate-400">Quantité</label><input type="number" className="w-full p-3 mb-3 bg-slate-900 rounded-lg outline-none focus:ring-1 focus:ring-indigo-500 text-slate-100" onChange={e=>setNewProduct({...newProduct, qty:e.target.value})} />
                      <label className="text-[9px] uppercase font-bold text-slate-400">Prix</label><input type="number" className="w-full p-3 mb-3 bg-slate-900 rounded-lg outline-none focus:ring-1 focus:ring-indigo-500 text-slate-100" onChange={e=>setNewProduct({...newProduct, price:e.target.value})} />
                      <FileInput onFileSelect={(file) => setNewProduct({...newProduct, imageFile: file})} label="Image (optionnel)" />
                      <div className="flex gap-3"><button onClick={()=>setShowProductModal(false)} className="flex-1 py-3 bg-slate-700 rounded-xl font-medium text-slate-200">Annuler</button><button onClick={()=>requestConfirm("addProduct",null,addProduct)} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-medium">Ajouter</button></div>
                    </>
                  )}
                </div>
              </div>
            )}
            
            {confirmAction && (
              <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-[200]">
                <div className="bg-slate-800 w-full max-w-[280px] rounded-2xl p-5 shadow-2xl border border-slate-700">
                  <p className="text-slate-100 text-center font-medium mb-4">Confirmer l'action ?</p>
                  <div className="flex gap-3"><button onClick={cancelConfirm} className="flex-1 py-2 bg-slate-700 rounded-xl font-medium text-slate-200">Annuler</button><button onClick={executeConfirm} className="flex-1 py-2 bg-indigo-600 text-white rounded-xl font-bold">Confirmer</button></div>
                </div>
              </div>
            )}
            
            {isAdmin && <DebugConsole />}
          </div>
          <style>{`::-webkit-scrollbar { display: none; } @keyframes fade-in-down { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } } .animate-fade-in-down { animation: fade-in-down 0.3s ease-out; }`}</style>
        </div>
      );
    };
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ErrorBoundary, null, React.createElement(App, null)));
  </script>
</body>
</html>
