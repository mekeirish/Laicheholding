  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useCallback, useRef } = React;

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, errorInfo) { console.error('Erreur capturée:', error, errorInfo); }
      render() {
        if (this.state.hasError) {
          return React.createElement('div', { className: 'p-8 bg-red-900 text-white' }, 
            'Une erreur est survenue. Voir console pour détails.');
        }
        return this.props.children;
      }
    }

    const normalizeString = (str) => {
      return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    };

    // Redimensionnement d'image en conservant le format (PNG pour transparence)
    const resizeImage = (file, maxWidth = 800) => {
      return new Promise((resolve, reject) => {
        if (!file.type.startsWith('image/')) {
          reject(new Error('Le fichier n\'est pas une image valide.'));
          return;
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) {
              height = (height * maxWidth) / width;
              width = maxWidth;
            }
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            // Déterminer le type MIME de sortie : PNG si l'original est PNG (transparence), sinon JPEG
            let outputType = 'image/jpeg';
            let quality = 0.85;
            if (file.type === 'image/png') {
              outputType = 'image/png';
              quality = undefined; // PNG sans perte
            } else if (file.type === 'image/webp') {
              outputType = 'image/webp';
              quality = 0.9;
            }
            
            canvas.toBlob(
              (blob) => {
                if (blob) resolve(blob);
                else reject(new Error('Échec de la conversion en Blob.'));
              },
              outputType,
              quality
            );
          };
          img.onerror = () => reject(new Error('Erreur lors du chargement de l\'image.'));
          img.src = e.target.result;
        };
        reader.onerror = () => reject(new Error('Erreur lors de la lecture du fichier.'));
        reader.readAsDataURL(file);
      });
    };

    const uploadToImgBB = async (file) => {
      const apiKey = localStorage.getItem('imgbb_api_key');
      if (!apiKey) {
        throw new Error('Configuration requise : Veuillez renseigner votre clé API ImgBB dans IMGbank.');
      }
      try {
        const resizedBlob = await resizeImage(file, 800);
        const formData = new FormData();
        formData.append('image', resizedBlob, file.name);
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
          method: 'POST',
          body: formData
        });
        const data = await response.json();
        if (data.success) {
          return data.data.url;
        } else {
          throw new Error(data.error?.message || 'Upload ImgBB échoué');
        }
      } catch (err) {
        console.error('Erreur upload ImgBB:', err);
        throw err;
      }
    };

    const cleanBrands = (brandsArray) => {
      if (!Array.isArray(brandsArray)) return [];
      return brandsArray.filter(b => 
        b && typeof b === 'object' && 
        b.name && typeof b.name === 'string' && b.name.trim() !== ''
      ).map(b => ({
        ...b,
        name: b.name.trim(),
        products: Array.isArray(b.products) ? b.products.map(p => ({ ...p, hidden: p.hidden === true })) : []
      }));
    };

    const cleanOrders = (ordersArray) => {
      if (!Array.isArray(ordersArray)) return [];
      return ordersArray.filter(o => o && typeof o === 'object').map(o => {
        let items = o.items;
        if (!Array.isArray(items)) items = Object.values(items || {});
        items = items.filter(i => i && i.product && i.product.name);
        return {
          ...o,
          items: items,
          total: typeof o.total === 'number' ? o.total : 0,
          delivery: o.delivery || { name: '', phone: '', address: '', instructions: '' },
          status: o.status || 'new'
        };
      });
    };

    const cleanOldDeliveredOrders = (orders, months = 3) => {
      const now = new Date();
      const cutoff = new Date(now.setMonth(now.getMonth() - months));
      return orders.filter(order => {
        if (order.status !== 'delivered') return true;
        let date = new Date(order.timestamp);
        if (isNaN(date)) {
          const parts = order.timestamp.split(/[ ,/:]+/);
          if (parts.length >= 3) {
            date = new Date(`${parts[2]}-${parts[1]}-${parts[0]}T${parts[3]}:${parts[4]}:${parts[5]}`);
          }
        }
        return date > cutoff;
      });
    };

    // Composant modale de gestion des produits avec recherche
    const ManageProductsModal = ({ 
      brands, setBrands, 
      editingProduct, setEditingProduct, 
      toggleProductHidden, deleteProduct, deleteBrand,
      setEditingBrand,
      requestConfirm, closeModal,
      smartStock, setSmartStock

      const [expandedBrands, setExpandedBrands] = useState(new Set());
      const safeBrands = Array.isArray(brands) ? brands : [];

      const productMatches = (product) => {
        if (!searchTerm.trim()) return false;
        return product.name.toLowerCase().includes(searchTerm.toLowerCase());
      };

      const getBrandsWithMatches = () => {
        if (!searchTerm.trim()) return new Set();
        const matches = new Set();
        safeBrands.forEach(brand => {
          if (brand.products.some(p => productMatches(p))) {
            matches.add(brand.id);
          }
        });
        return matches;
      };

      useEffect(() => {
        if (searchTerm.trim()) {
          setExpandedBrands(getBrandsWithMatches());
        } else {
          setExpandedBrands(new Set());
        }
      }, [searchTerm, brands]);

      const toggleBrand = (brandId) => {
        if (searchTerm.trim()) return;
        const newSet = new Set(expandedBrands);
        if (newSet.has(brandId)) {
          newSet.delete(brandId);
        } else {
          newSet.add(brandId);
        }
        setExpandedBrands(newSet);
      };

      const filteredProducts = (products) => {
        if (!searchTerm.trim()) return products;
        return products.filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));

          React.createElement('div', { className: 'flex justify-between items-center mb-4' },

            React.createElement('button', { onClick: closeModal, className: 'text-slate-400 text-2xl hover:text-slate-200' }, '×')

          // Toggle Stock intelligent
          React.createElement('div', { className: 'flex items-center justify-between mb-4 p-3 bg-slate-700/30 rounded-xl border border-slate-700' },
            React.createElement('span', { className: 'text-slate-200 text-sm font-medium' }, '🧠 Stock intelligent'),
            React.createElement('button', {
              onClick: () => setSmartStock(!smartStock),
              className: `relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none ${smartStock ? 'bg-indigo-600' : 'bg-slate-600'}`

              React.createElement('span', {
                className: `inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${smartStock ? 'translate-x-6' : 'translate-x-1'}`
              })
            )
          ),
          React.createElement('input', {
            type: 'text',
            placeholder: '🔍 Rechercher un produit...',
            value: searchTerm,
            onChange: (e) => setSearchTerm(e.target.value),
            className: 'w-full p-3 mb-4 rounded-xl bg-slate-800 text-white border border-slate-700 focus:outline-none focus:border-indigo-500'
          }),

            if (searchTerm.trim() && !hasMatchingProducts) return null;
            
            return React.createElement('div', { key: b.id, className: 'mb-3' },

                ),
                filteredProducts(b.products).length === 0 && searchTerm.trim() !== '' ?
                  React.createElement('p', { className: 'text-center text-slate-400 py-4 text-sm' }, 'Aucun produit ne correspond à votre recherche') :
                  filteredProducts(b.products).map(p => {
                    const stock = p.qty !== undefined ? p.qty : 0;
                    const isLowStock = stock < 5;
                    return React.createElement(React.Fragment, { key: p.id },
                      React.createElement('div', { className: 'flex items-center gap-2 mb-2' },
                        React.createElement('button', { 
                          onClick: (e) => { e.stopPropagation(); setEditingProduct(editingProduct?.id === p.id ? null : p); },
                          className: 'flex-1 p-3 bg-slate-900 border border-slate-700 text-slate-200 text-xs font-medium rounded-lg shadow-sm hover:bg-slate-800 text-left'
                        }, p.name, ' ', 
                          React.createElement('span', { className: isLowStock ? 'text-red-400 font-bold' : 'text-slate-400' }, `(stock: ${stock})`),
                          p.hidden && React.createElement('span', { className: 'ml-2 text-orange-400 text-[10px]' }, '(masqué)')
                        ),
                        React.createElement('button', { 
                          onClick: (e) => { e.stopPropagation(); toggleProductHidden(b.id, p.id); },
                          className: `w-10 h-10 flex items-center justify-center rounded-full lg:w-auto lg:h-auto lg:px-3 lg:py-1.5 lg:rounded-lg text-xs font-bold ${p.hidden ? 'bg-orange-900/50 text-orange-300' : 'bg-slate-700 text-slate-200'} flex-shrink-0`,
                          title: p.hidden ? "Afficher" : "Masquer"
                        }, 
                          React.createElement('span', { className: 'lg:hidden' }, p.hidden ? '👁️' : '🚫'),
                          React.createElement('span', { className: 'hidden lg:inline' }, p.hidden ? '👁️ Afficher' : '🚫 Masquer')
                        ),
                        React.createElement('button', { 
                          onClick: (e) => { e.stopPropagation(); requestConfirm("deleteProduct", { brandId: b.id, productId: p.id }, () => deleteProduct(b.id, p.id)); },
                          className: 'w-10 h-10 flex items-center justify-center rounded-full lg:w-auto lg:h-auto lg:px-3 lg:py-1.5 lg:rounded-lg bg-red-900/50 text-red-300 rounded-lg text-xs font-bold flex-shrink-0'
                        },
                          React.createElement('span', { className: 'lg:hidden' }, '✕'),
                          React.createElement('span', { className: 'hidden lg:inline' }, '✕ Supprimer')
                        )
                      ),
                      editingProduct && editingProduct.id === p.id && React.createElement('div', { className: 'p-4 mt-2 mb-3 bg-slate-900 rounded-2xl border border-slate-700', onClick: (e) => e.stopPropagation() },
                        React.createElement('label', { className: 'text-[9px] font-bold text-slate-400 uppercase' }, 'Nom'),
                        React.createElement('input', { type: 'text', value: editingProduct.name, className: 'w-full p-2 mb-2 bg-slate-800 rounded-lg border border-slate-700 text-slate-100', onChange: e => setEditingProduct({...editingProduct, name: e.target.value}) }),
                        React.createElement('label', { className: 'text-[9px] font-bold text-slate-400 uppercase' }, 'Quantité (stock)'),
                        React.createElement('input', { type: 'number', value: editingProduct.qty, className: 'w-full p-2 mb-2 bg-slate-800 rounded-lg border border-slate-700 text-slate-100', onChange: e => setEditingProduct({...editingProduct, qty: parseInt(e.target.value) || 0}) }),
                        React.createElement('label', { className: 'text-[9px] font-bold text-slate-400 uppercase' }, 'Prix'),
                        React.createElement('input', { type: 'number', value: editingProduct.price, className: 'w-full p-2 mb-3 bg-slate-800 rounded-lg border border-slate-700 text-slate-100', onChange: e => setEditingProduct({...editingProduct, price: e.target.value}) }),
                        React.createElement(FileInput, { onFileSelect: (file) => setEditingProduct({...editingProduct, imageFile: file}), label: 'Nouvelle image (optionnel)' }),
                        React.createElement('div', { className: 'flex gap-2' },
                          React.createElement('button', { onClick: () => setEditingProduct(null), className: 'flex-1 py-2 bg-slate-700 border border-slate-600 rounded-lg text-slate-200' }, 'Annuler'),
                          React.createElement('button', { onClick: () => requestConfirm("saveProduct", null, saveProductEdit), className: 'flex-1 py-2 bg-indigo-600 text-white rounded-lg' }, 'Enregistrer')
                        )
                      )
                    );
                  })
              )
            );
          }),
          React.createElement('button', { onClick: closeModal, className: 'w-full py-3 bg-indigo-600 text-white rounded-xl mt-4 font-medium hover:bg-indigo-500' }, 'Fermer')
        )
      );
    };

    const App = () => {
      const [isAdmin, setIsAdmin] = useState(false);
      const [currentView, setCurrentView] = useState('home');
      const [selectedBrand, setSelectedBrand] = useState(null);
      const [isTransitioning, setIsTransitioning] = useState(false);
      const [notification, setNotification] = useState(null);

      const [showModal, setShowModal] = useState(false);
      const [showProductModal, setShowProductModal] = useState(false);
      const [showBrandSelect, setShowBrandSelect] = useState(false);
      const [showManageModal, setShowManageModal] = useState(false);
      const [showOrdersModal, setShowOrdersModal] = useState(false);
      const [showDataModal, setShowDataModal] = useState(false);
      const [editingProduct, setEditingProduct] = useState(null);
      const [editingBrand, setEditingBrand] = useState(null);
      const [confirmAction, setConfirmAction] = useState(null);
      const [showPinModal, setShowPinModal] = useState(false);

      const [showPrices, setShowPrices] = useState(() => {

      const [orders, setOrders] = useState(() => {

        const parsed = savedOrders ? JSON.parse(savedOrders) : [];
        return cleanOrders(parsed);
      });
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [showCartModal, setShowCartModal] = useState(false);
      const [productQuantity, setProductQuantity] = useState(1);
      const [showDeliveryModal, setShowDeliveryModal] = useState(false);
      const [deliveryInfo, setDeliveryInfo] = useState({ name: "", phone: "", address: "", instructions: "" });
      const [ordersActiveTab, setOrdersActiveTab] = useState("new");
      const [logs, setLogs] = useState([]);
      const [showDebug, setShowDebug] = useState(false);
      const logsEndRef = useRef(null);
      const [previewData, setPreviewData] = useState(null);
      const [isImporting, setIsImporting] = useState(false);
      const firebaseInitialized = useRef(false);
      const [firebaseReady, setFirebaseReady] = useState(false);
      const initialLoadDone = useRef(false);
      
      // Sauvegarde des préférences
      useEffect(() => {
        localStorage.setItem('showPrices', showPrices);
      }, [showPrices]);
      useEffect(() => {
        localStorage.setItem('smartStock', smartStock);
      }, [smartStock]);
      
      const addLog = useCallback((type, ...args) => {
        const timestamp = new Date().toLocaleTimeString();
        const message = args.map(arg => {
          if (typeof arg === 'object') { try { return JSON.stringify(arg); } catch(e) { return String(arg); } }
          return String(arg);
        }).join(' ');
        setLogs(prev => [{ type, timestamp, message }, ...prev].slice(0, 500));
      }, []);
      
      useEffect(() => {
        const originalLog = console.log;
        const originalError = console.error;
        console.log = (...args) => { addLog('log', ...args); originalLog(...args); };
        console.error = (...args) => { addLog('error', ...args); originalError(...args); };
        const handleError = (event) => addLog('error', `Global: ${event.message}`);
        const handleRejection = (event) => addLog('error', `Rejection: ${event.reason}`);
        window.addEventListener('error', handleError);
        window.addEventListener('unhandledrejection', handleRejection);
        return () => {
          console.log = originalLog; console.error = originalError;
          window.removeEventListener('error', handleError);
          window.removeEventListener('unhandledrejection', handleRejection);
        };
      }, [addLog]);
      
      // Firebase init
      useEffect(() => {
        let mounted = true;
        const initFirebase = () => {
          try {
            if (!window.firebaseInitialized && window.firebase && !firebaseInitialized.current) {
              const firebaseConfig = {
                apiKey: "AIzaSyBauxPkS-FXjCSErcluaOlReANeOL0vPEs",
                authDomain: "monapp-d2909.firebaseapp.com",
                databaseURL: "https://monapp-d2909-default-rtdb.europe-west1.firebasedatabase.app",
                projectId: "monapp-d2909",

          const product = brand.products.find(p => p.id === item.product.id);
          if (!product) return { ok: false, message: `Produit ${item.product.name} introuvable` };
          const availableStock = product.qty || 0;
          if (availableStock < item.quantity) {
            return { ok: false, message: `Stock insuffisant pour ${item.product.name} (demande: ${item.quantity}, disponible: ${availableStock})` };
          }
        }
        return { ok: true };

      const updateStockFromOrder = (orderItems) => {
        let updatedBrands = [...brands];

          if (brandIndex === -1) {
            hasError = true;
            errorMessage = `Marque non trouvée pour ${item.product.name}`;
            break;
          }
          const productIndex = updatedBrands[brandIndex].products.findIndex(p => p.id === item.product.id);
          if (productIndex === -1) {
            hasError = true;
            errorMessage = `Produit ${item.product.name} non trouvé`;
            break;
          }
          const currentStock = updatedBrands[brandIndex].products[productIndex].qty || 0;
          if (currentStock < item.quantity) {
            hasError = true;
            errorMessage = `Stock insuffisant pour ${item.product.name} (demande: ${item.quantity}, disponible: ${currentStock})`;
            break;
          }
          const newStock = currentStock - item.quantity;
          updatedBrands[brandIndex].products[productIndex].qty = newStock;

        if (!files || files.length === 0) return;

        }
        if (!firebaseReady || !window.firebase) {

        if (!apiKey) {

          return;
        }
        notify(`Import de ${files.length} produit(s) en cours...`);
        try {
          setIsUploadingBatch(true);
          setBatchProgress({ current: 0, total: files.length, status: 'Préparation...' });
          let updatedBrands = [...brands];
          const brandIndex = updatedBrands.findIndex(b => b.id === selectedBrandForBatch);
          if (brandIndex === -1) throw new Error('La marque sélectionnée n\'existe plus.');
          let currentProducts = updatedBrands[brandIndex].products;
          let createdCount = 0, updatedCount = 0, errorCount = 0;
          for (let i = 0; i < files.length; i++) {
            const file = files[i];
            setBatchProgress({ current: i + 1, total: files.length, status: `Traitement de ${file.name}...` });
            try {
              const imageUrl = await uploadToImgBB(file);
              const baseName = file.name.replace(/\.[^/.]+$/, '').trim();
              if (!baseName) throw new Error('Nom de fichier invalide');
              const normalizedBase = normalizeString(baseName);
              const existingProduct = currentProducts.find(p => normalizeString(p.name) === normalizedBase);
              if (existingProduct) {
                const productIdx = currentProducts.findIndex(p => p.id === existingProduct.id);
                if (productIdx !== -1) {
                  currentProducts[productIdx] = { ...existingProduct, image: imageUrl };
                  updatedCount++;
                }
              } else {
                const newProductObj = {
                  id: Date.now() + Math.random(),
                  name: baseName,
                  qty: 0,
                  price: 0,
                  image: imageUrl,
                  hidden: false
                };
                currentProducts.push(newProductObj);
                createdCount++;
              }
            } catch (err) {
              console.error(`Erreur pour ${file.name}:`, err);
              errorCount++;
              addLog('error', `Erreur pour ${file.name}: ${err.message}`);
            }
          }
          if (createdCount + updatedCount > 0) {
            const db = window.firebase.database();
            await db.ref(`data/${brandIndex}/products`).set(currentProducts);
            updatedBrands[brandIndex].products = currentProducts;
            setBrands(updatedBrands);

            throw new Error('Aucun produit n\'a été créé ou mis à jour.');
          }
          setBatchProgress({ current: files.length, total: files.length, status: 'Terminé' });
          if (errorCount === 0) {
            notify(`✅ Import réussi : ${createdCount} créés, ${updatedCount} mis à jour.`);
            setShowBatchModal(false);
          } else {
            const partialSuccess = (createdCount + updatedCount) > 0;
            const msg = `Import terminé avec ${errorCount} erreur(s). ${partialSuccess ? 'Voulez-vous fermer la fenêtre ?' : 'Aucune image importée.'}`;
            if (partialSuccess && window.confirm(msg)) {
              setShowBatchModal(false);
            } else if (!partialSuccess) {

              notify(`⚠️ Import partiel : ${createdCount} créés, ${updatedCount} mis à jour, ${errorCount} erreur(s).`);

          console.error('Erreur globale handleBatchProductUpload:', err);

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = new Uint8Array(evt.target.result);
            const wb = window.XLSX.read(data, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
            if(!rows || rows.length<2) throw new Error("Fichier vide");
            const brandProducts = new Map();
            let totalProducts = 0, errors = [];
            for(let i=1; i<rows.length; i++) {
              const row = rows[i];
              if(!row || row.length<4) continue;
              let brandName = row[0]?.trim() || "";
              const productName = row[1]?.trim();
              if(!productName) continue;
              if(!brandName) brandName = "Inconnue";
              let qty = parseFloat(row[2]), price = parseFloat(row[3]);
              if(isNaN(qty)) { errors.push(`Ligne ${i+1}: Qté non numérique`); continue; }
              if(isNaN(price)) { errors.push(`Ligne ${i+1}: Prix non numérique`); continue; }
              if(!brandProducts.has(brandName)) brandProducts.set(brandName, new Map());
              const prodMap = brandProducts.get(brandName);
              if(!prodMap.has(productName)) { prodMap.set(productName, { qty, price }); totalProducts++; }
              else prodMap.set(productName, { qty, price });
            }
            setPreviewData({ brandProducts, totalProducts, totalBrands: brandProducts.size, errors });
            notify(`Analyse : ${totalProducts} produits, ${brandProducts.size} marques, ${errors.length} erreurs.`);
          } catch(e) { addLog('error', e.message); notify("Erreur analyse"); setPreviewData(null); }
        };
        reader.readAsArrayBuffer(file);
      };

        const rows = [["Date","ID Commande","Client","Téléphone","Marque","Produit","Quantité","Prix Unitaire","Total Ligne","Instructions"]];
        deliveredOrders.forEach(order => {
          const delivery = order.delivery || {};
          const timestamp = order.timestamp || "";
          const orderId = order.id || "";
          const client = delivery.name || "";
          const phone = delivery.phone || "";
          const instructions = delivery.instructions || "";
          const items = order.items || [];
          items.forEach(item => {

        const escapeCSV = (value) => {
          if (value === undefined || value === null) return "";
          const str = String(value);

        const csvContent = rows.map(row => row.map(escapeCSV).join(",")).join("\n");

              <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-[200]">
                <div className="bg-slate-800 w-full max-w-[280px] lg:max-w-md lg:mx-auto rounded-2xl p-5 shadow-2xl border border-slate-700">
                  <p className="text-slate-100 text-center font-medium mb-4">Confirmer l'action ?</p>
                  <div className="flex gap-3">
                    <button onClick={cancelConfirm} className="flex-1 py-2 bg-slate-700 rounded-xl font-medium text-slate-200">Annuler</button>
                    <button onClick={executeConfirm} className="flex-1 py-2 bg-indigo-600 text-white rounded-xl font-bold">Confirmer</button>
                  </div>
                </div>
              </div>
            )}
            
            {isAdmin && <DebugConsole />}
          </div>
          
          {/* Barre de navigation mobile */}
          <div className="mobile-bottom-nav">
            <button 
              onClick={() => setShowCartModal(true)} 
              className="cart-button"
            >
              🛒
            </button>
            {cart.length > 0 && (
              <span className="absolute -top-2 -right-2 bg-emerald-600 text-white text-[10px] font-bold rounded-full w-5 h-5 flex items-center justify-center shadow-md" style={{ right: 'calc(50% - 32px)', top: '8px' }}>
                {cart.reduce((s,i)=>s+i.quantity,0)}
              </span>
            )}
          </div>
          <style>{`::-webkit-scrollbar { display: none; } @keyframes fade-in-down { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } } .animate-fade-in-down { animation: fade-in-down 0.3s ease-out; }`}</style>
        </div>
      );
    };
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ErrorBoundary, null, React.createElement(App, null)));
  </script>
</body>
</html>
